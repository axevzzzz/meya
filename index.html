<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Button Example</title>
    <script>
        function showMessage() {
            document.getElementById("message").textContent = "why would you actually click it, IM LITERALLY IN LOVE WITH YOU AND WILL BE HERE WITH YOU FOREVER AND EVER";
        }
    </script>
</head>
<body>
    <h1>If you ever think I dont love you just click this button</h1>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>
</body>
</html>
